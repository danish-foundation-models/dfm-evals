sets:
  agentic:
    description: Agentic suite
    tasks:
      - name: inspect_evals/agentharm
        args:
          - -T
          - refusal_judge={{judge_model}}
          - -T
          - semantic_judge={{judge_model}}
          - --max-tokens
          - "512"
      - name: inspect_evals/agentharm_benign
        args:
          - -T
          - refusal_judge={{judge_model}}
          - -T
          - semantic_judge={{judge_model}}
          - --max-tokens
          - "512"
      - name: inspect_evals/agentdojo
        args:
          - -T
          - with_sandbox_tasks=no
          - -T
          - workspace=banking
    args:
      - --model
      - "{{target_model}}"
      - --limit
      - "25"
      - --sample-shuffle
      - "4242"
      - --temperature
      - "0"
  fundamentals:
    description: Broad inspect_evals fundamentals set
    tasks:
      - inspect_evals/gsm8k
      - inspect_evals/ifeval
      - ifeval-da
      - inspect_evals/truthfulqa
      - name: generative-talemaader
        args:
          - -T
          - judge_model={{judge_model}}
      - danish-citizen-tests
      - dala
      - gec_dala
      - multi_wiki_qa
      - inspect_evals/bfcl
    args:
      - --model
      - "{{target_model}}"
      - --limit
      - "250"
      - --sample-shuffle
      - "4242"
      - --temperature
      - "0"
  openthoughts_tblite:
    description: inspect_harbor OpenThoughts-TBLite suite (requires inspect-harbor; sample failures are logged without aborting the full eval)
    tasks:
      - inspect_harbor/openthoughts_tblite
    args:
      - --model
      - "{{target_model}}"
      - --no-fail-on-error
      - --continue-on-fail
      - --message-limit
      - "100"
      - --limit
      - "250"
      - --sample-shuffle
      - "4242"
      - --temperature
      - "0"
